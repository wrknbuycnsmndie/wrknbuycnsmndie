name: wakatime-stats

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    name: Update README with dev metrics
    runs-on: ubuntu-latest

    steps:
      - uses: anmol098/waka-readme-stats@master
        with:
          # Auth
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

          # Commit
          COMMIT_BY_ME: 'False'
          COMMIT_MESSAGE: 'Daily update for dev metrics'
          COMMIT_USERNAME: 'wrknbuycnsmndie'
          COMMIT_EMAIL: 'a_chapala@mail.ru'

          # README section
          SECTION_NAME: 'waka'

          # General info
          SHOW_SHORT_INFO: 'True'
          SHOW_PROFILE_VIEWS: 'True'
          SHOW_UPDATED_DATE: 'True'

          # WakaTime stats
          SHOW_LANGUAGE: 'True'
          SHOW_PROJECTS: 'False'
          SHOW_EDITORS: 'True'
          SHOW_OS: 'True'
          SHOW_TOTAL_CODE_TIME: 'True'

          # GitHub stats
          SHOW_COMMIT: 'True'
          SHOW_DAYS_OF_WEEK: 'True'
          SHOW_LINES_OF_CODE: 'True'

          # Extra / noisy blocks
          SHOW_LANGUAGE_PER_REPO: 'False'
          SHOW_LOC_CHART: 'True'
          SHOW_TIMEZONE: 'False'
