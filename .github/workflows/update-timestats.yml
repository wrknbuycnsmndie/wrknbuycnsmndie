name: wakatime-stats

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    name: Update Readme with Metrics
    runs-on: ubuntu-latest

    steps:
      - uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

          COMMIT_BY_ME: 'False'
          COMMIT_MESSAGE: 'Daily update for the dev metrics'
          COMMIT_USERNAME: 'wrknbuycnsmndie'
          COMMIT_EMAIL: 'a_chapala@mail.ru'

          SHOW_PROFILE_VIEWS: 'True'
          SHOW_SHORT_INFO: 'True'
          SHOW_UPDATED_DATE: 'True'

          SHOW_LANGUAGE: 'True'
          SHOW_PROJECTS: 'False'
          SHOW_LINES_OF_CODE: 'True'
          SHOW_COMMIT: 'True'

          SHOW_OS: 'True'
          SHOW_EDITORS: 'True'
          SHOW_LANGUAGE_PER_REPO: 'False'
          SHOW_LOC_CHART: 'True'
          SHOW_DAYS_OF_WEEK: 'True'
          SHOW_TIMEZONE: 'False'
